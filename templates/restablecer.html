<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a2e; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background-color: #16213e; border: 1px solid #0f3460; color: #eee; width: 100%; max-width: 400px; }
        input { background-color: #0f3460 !important; color: #eee !important; border: 1px solid #533483 !important; }
        input::placeholder { color: #aaa !important; }
    </style>
</head>
<body>
    <div class="card p-4">
        <h2 class="text-center mb-1">💰 Mis Finanzas</h2>
        <p class="text-center text-secondary mb-4">Restablecer contraseña</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-danger">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
        <form action="/restablecer/{{ token }}" method="POST">
            <input type="password" name="password" class="form-control mb-3" placeholder="Nueva contraseña" required>
            <input type="password" name="confirmar" class="form-control mb-3" placeholder="Confirmar contraseña" required>
            <button type="submit" class="btn btn-success w-100">Restablecer contraseña</button>
        </form>
        <p class="text-center mt-3"><a href="/login" class="text-success">← Volver al login</a></p>
    </div>
</body>
</html>
