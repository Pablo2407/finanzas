<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación 2FA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a2e; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background-color: #16213e; border: 1px solid #0f3460; color: #eee; width: 100%; max-width: 400px; }
        input { background-color: #0f3460 !important; color: #eee !important; border: 1px solid #533483 !important; }
        input::placeholder { color: #aaa !important; }
    </style>
</head>
<body>
    <div class="card p-4">
        <h2 class="text-center mb-1">💰 Mis Finanzas</h2>
        <p class="text-center text-secondary mb-4">Verificación de dos factores</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-danger">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
        <p class="text-secondary text-center">Ingresa el código de 6 dígitos de Google Authenticator</p>
        <form action="/login/2fa" method="POST">
            <input type="text" name="codigo" class="form-control mb-3 text-center fs-4" placeholder="000000" maxlength="6" required autofocus>
            <button type="submit" class="btn btn-success w-100">Verificar</button>
        </form>
        <p class="text-center mt-3"><a href="/login" class="text-success">← Volver al login</a></p>
    </div>
</body>
</html>
