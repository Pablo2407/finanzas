<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráficas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a2e; color: #eee; }
        .navbar { background-color: #16213e; }
        .card { background-color: #16213e; border: 1px solid #0f3460; color: #eee; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-3 py-3 mb-4">
        <span class="navbar-brand fw-bold fs-5">💰 Mis Finanzas</span>
        <a href="/" class="btn btn-outline-light btn-sm">← Volver</a>
    </nav>

    <div class="container">
        <h3 class="mb-4">📈 Mis Gráficas</h3>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card p-4">
                    <h5 class="mb-3">📊 Ingresos vs Gastos por mes</h5>
                    <canvas id="graficaMeses"></canvas>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card p-4">
                    <h5 class="mb-3">🍩 Gastos por categoría</h5>
                    <canvas id="graficaCategorias"></canvas>
                </div>
            </div>

            <div class="col-12">
                <div class="card p-4">
                    <h5 class="mb-3">📈 Evolución del balance</h5>
                    <canvas id="graficaBalance"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const meses = {{ meses | tojson }};
        const ingresos = {{ ingresos | tojson }};
        const gastos = {{ gastos | tojson }};
        const categorias = {{ categorias | tojson }};
        const montosCategorias = {{ montos_categorias | tojson }};
        const balances = {{ balances | tojson }};
        const fechas = {{ fechas | tojson }};

        // Gráfica ingresos vs gastos por mes
        new Chart(document.getElementById('graficaMeses'), {
            type: 'bar',
            data: {
                labels: meses,
                datasets: [
                    {
                        label: 'Ingresos',
                        data: ingresos,
                        backgroundColor: '#4CAF50'
                    },
                    {
                        label: 'Gastos',
                        data: gastos,
                        backgroundColor: '#e94560'
                    }
                ]
            },
            options: {
                plugins: { legend: { labels: { color: '#eee' } } },
                scales: {
                    x: { ticks: { color: '#eee' }, grid: { color: '#0f3460' } },
                    y: { ticks: { color: '#eee' }, grid: { color: '#0f3460' } }
                }
            }
        });

        // Gráfica categorías
        new Chart(document.getElementById('graficaCategorias'), {
            type: 'doughnut',
            data: {
                labels: categorias,
                datasets: [{
                    data: montosCategorias,
                    backgroundColor: ['#FF6384','#36A2EB','#FFCE56','#4CAF50','#9966FF']
                }]
            },
            options: {
                plugins: { legend: { labels: { color: '#eee' } } }
            }
        });

        // Gráfica balance
        new Chart(document.getElementById('graficaBalance'), {
            type: 'line',
            data: {
                labels: fechas,
                datasets: [{
                    label: 'Balance',
                    data: balances,
                    borderColor: '#4CAF50',
                    backgroundColor: 'rgba(76, 175, 80, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                plugins: { legend: { labels: { color: '#eee' } } },
                scales: {
                    x: { ticks: { color: '#eee' }, grid: { color: '#0f3460' } },
                    y: { ticks: { color: '#eee' }, grid: { color: '#0f3460' } }
                }
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
