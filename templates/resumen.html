<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen Mensual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a2e; color: #eee; }
        .navbar { background-color: #16213e; }
        .card { background-color: #16213e; border: 1px solid #0f3460; color: #eee; }
        .table { color: #eee; }
        .table thead { background-color: #0f3460; }
        .table tbody tr:hover { background-color: #16213e; }
        .positivo { color: #4CAF50; font-weight: bold; }
        .negativo { color: #e94560; font-weight: bold; }
        .ingreso { color: #4CAF50; font-weight: bold; }
        .gasto { color: #e94560; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-4 py-3 mb-4">
        <span class="navbar-brand fw-bold fs-4">💰 Mis Finanzas</span>
        <a href="/" class="btn btn-outline-light btn-sm">← Volver al inicio</a>
    </nav>

    <div class="container">
        <div class="card p-4">
            <h3 class="mb-4">📅 Resumen Mensual</h3>
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Mes</th>
                        <th>Ingresos</th>
                        <th>Gastos</th>
                        <th>Balance</th>
                    </tr>
                </thead>
                <tbody>
                    {% for mes, datos in resumen.items() | sort(reverse=True) %}
                    <tr>
                        <td>{{ mes }}</td>
                        <td class="ingreso">${{ "%.2f"|format(datos.ingresos) }}</td>
                        <td class="gasto">${{ "%.2f"|format(datos.gastos) }}</td>
                        <td class="{{ 'positivo' if datos.ingresos >= datos.gastos else 'negativo' }}">
                            ${{ "%.2f"|format(datos.ingresos - datos.gastos) }}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
